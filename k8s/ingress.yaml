apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: knowledge-ingress
  namespace: knowledge
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: knowledge.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: knowledge
            port:
              number: 8080
